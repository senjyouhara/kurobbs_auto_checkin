name: Keepalive Workflow

# 防止 GitHub Actions 在 60 天不活动后自动禁用工作流
# 每 50 天运行一次，保持工作流活跃

on:
  schedule:
    # 每 50 天运行一次 (每月 1 日和 21 日 UTC 1:00)
    - cron: '0 1 5 * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 保持活跃 Update tmp.txt with timestamp
        run: |
          date "+%Y-%m-%d %H:%M:%S" > tmp.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "ayano@loli.com.co"
          
          git add tmp.txt
          git commit -m "chore: update tmp.txt with timestamp"
          git push
